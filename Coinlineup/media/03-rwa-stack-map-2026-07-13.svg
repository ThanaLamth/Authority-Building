<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">RWA stack map for 2026</title>
  <desc id="desc">A comparison graphic highlighting Ondo for product clarity, Chainlink for infrastructure, and Centrifuge for protocol-level RWA purity.</desc>
  <rect width="1600" height="900" fill="#f7f1e7"/>
  <rect x="60" y="60" width="1480" height="780" rx="28" fill="#fffaf2" stroke="#d8ccb8" stroke-width="4"/>
  <text x="100" y="135" fill="#18212b" font-family="Arial, sans-serif" font-size="54" font-weight="700">RWA stack map for 2026</text>
  <text x="100" y="182" fill="#4b5563" font-family="Arial, sans-serif" font-size="28">This category is already a stack, not a single project type.</text>
  <rect x="100" y="250" width="400" height="430" rx="24" fill="#e7f1ff"/>
  <rect x="100" y="250" width="400" height="64" rx="24" fill="#2f6fed"/>
  <text x="130" y="293" fill="#ffffff" font-family="Arial, sans-serif" font-size="34" font-weight="700">Ondo</text>
  <text x="130" y="356" fill="#18212b" font-family="Arial, sans-serif" font-size="26">Role: product clarity</text>
  <text x="130" y="406" fill="#374151" font-family="Arial, sans-serif" font-size="24">Tokenized treasury framing</text>
  <text x="130" y="446" fill="#374151" font-family="Arial, sans-serif" font-size="24">Easy beginner explanation</text>
  <text x="130" y="486" fill="#374151" font-family="Arial, sans-serif" font-size="24">Best first RWA story</text>
  <text x="130" y="556" fill="#7c2d12" font-family="Arial, sans-serif" font-size="24">Watchout: narrower than full-stack infrastructure</text>
  <rect x="600" y="250" width="400" height="430" rx="24" fill="#fff0d8"/>
  <rect x="600" y="250" width="400" height="64" rx="24" fill="#f59e0b"/>
  <text x="630" y="293" fill="#ffffff" font-family="Arial, sans-serif" font-size="34" font-weight="700">Chainlink</text>
  <text x="630" y="356" fill="#18212b" font-family="Arial, sans-serif" font-size="26">Role: data and rails</text>
  <text x="630" y="406" fill="#374151" font-family="Arial, sans-serif" font-size="24">Oracle and messaging layer</text>
  <text x="630" y="446" fill="#374151" font-family="Arial, sans-serif" font-size="24">Supports tokenized assets</text>
  <text x="630" y="486" fill="#374151" font-family="Arial, sans-serif" font-size="24">Infrastructure exposure</text>
  <text x="630" y="556" fill="#7c2d12" font-family="Arial, sans-serif" font-size="24">Watchout: less direct than a pure RWA token</text>
  <rect x="1100" y="250" width="400" height="430" rx="24" fill="#e8f7ec"/>
  <rect x="1100" y="250" width="400" height="64" rx="24" fill="#2f855a"/>
  <text x="1130" y="293" fill="#ffffff" font-family="Arial, sans-serif" font-size="34" font-weight="700">Centrifuge</text>
  <text x="1130" y="356" fill="#18212b" font-family="Arial, sans-serif" font-size="26">Role: protocol-level purity</text>
  <text x="1130" y="406" fill="#374151" font-family="Arial, sans-serif" font-size="24">Credit and asset pools</text>
  <text x="1130" y="446" fill="#374151" font-family="Arial, sans-serif" font-size="24">Very on-topic for RWAs</text>
  <text x="1130" y="486" fill="#374151" font-family="Arial, sans-serif" font-size="24">Good category anchor</text>
  <text x="1130" y="556" fill="#7c2d12" font-family="Arial, sans-serif" font-size="24">Watchout: less mainstream beginner familiarity</text>
  <text x="100" y="755" fill="#4b5563" font-family="Arial, sans-serif" font-size="24">Decision shortcut: start with Ondo for a simple product story, Chainlink for infrastructure, and Centrifuge for protocol-level RWA relevance.</text>
</svg>
