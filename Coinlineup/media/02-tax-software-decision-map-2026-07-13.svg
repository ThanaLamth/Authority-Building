<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Crypto tax software decision map for 2026</title>
  <desc id="desc">A comparison graphic showing Koinly for general users, CoinLedger for simple exchange histories, and Crypto Tax Calculator for more complex DeFi activity.</desc>
  <rect width="1600" height="900" fill="#f7f1e7"/>
  <rect x="60" y="60" width="1480" height="780" rx="28" fill="#fffaf2" stroke="#d8ccb8" stroke-width="4"/>
  <text x="100" y="135" fill="#18212b" font-family="Arial, sans-serif" font-size="54" font-weight="700">Crypto tax software decision map for 2026</text>
  <text x="100" y="182" fill="#4b5563" font-family="Arial, sans-serif" font-size="28">The real split is not brand fame. It is simple users vs complex histories.</text>
  <rect x="100" y="250" width="400" height="430" rx="24" fill="#e7f1ff"/>
  <rect x="100" y="250" width="400" height="64" rx="24" fill="#2f6fed"/>
  <text x="130" y="293" fill="#ffffff" font-family="Arial, sans-serif" font-size="34" font-weight="700">Koinly</text>
  <text x="130" y="356" fill="#18212b" font-family="Arial, sans-serif" font-size="26">Best for: most users</text>
  <text x="130" y="406" fill="#374151" font-family="Arial, sans-serif" font-size="24">Balanced import coverage</text>
  <text x="130" y="446" fill="#374151" font-family="Arial, sans-serif" font-size="24">Approachable workflow</text>
  <text x="130" y="486" fill="#374151" font-family="Arial, sans-serif" font-size="24">Good first recommendation</text>
  <text x="130" y="556" fill="#7c2d12" font-family="Arial, sans-serif" font-size="24">Watchout: plans scale up with activity</text>
  <rect x="600" y="250" width="400" height="430" rx="24" fill="#fff0d8"/>
  <rect x="600" y="250" width="400" height="64" rx="24" fill="#f59e0b"/>
  <text x="630" y="293" fill="#ffffff" font-family="Arial, sans-serif" font-size="34" font-weight="700">CoinLedger</text>
  <text x="630" y="356" fill="#18212b" font-family="Arial, sans-serif" font-size="26">Best for: simple exchange histories</text>
  <text x="630" y="406" fill="#374151" font-family="Arial, sans-serif" font-size="24">Lower setup friction</text>
  <text x="630" y="446" fill="#374151" font-family="Arial, sans-serif" font-size="24">Good for first-time filers</text>
  <text x="630" y="486" fill="#374151" font-family="Arial, sans-serif" font-size="24">Clear basic workflow</text>
  <text x="630" y="556" fill="#7c2d12" font-family="Arial, sans-serif" font-size="24">Watchout: less attractive for edge-case DeFi</text>
  <rect x="1100" y="250" width="400" height="430" rx="24" fill="#e8f7ec"/>
  <rect x="1100" y="250" width="400" height="64" rx="24" fill="#2f855a"/>
  <text x="1130" y="293" fill="#ffffff" font-family="Arial, sans-serif" font-size="34" font-weight="700">Crypto Tax Calculator</text>
  <text x="1130" y="356" fill="#18212b" font-family="Arial, sans-serif" font-size="26">Best for: DeFi-heavy activity</text>
  <text x="1130" y="406" fill="#374151" font-family="Arial, sans-serif" font-size="24">Built for harder histories</text>
  <text x="1130" y="446" fill="#374151" font-family="Arial, sans-serif" font-size="24">More multichain depth</text>
  <text x="1130" y="486" fill="#374151" font-family="Arial, sans-serif" font-size="24">Better for complex workflows</text>
  <text x="1130" y="556" fill="#7c2d12" font-family="Arial, sans-serif" font-size="24">Watchout: more than many beginners need</text>
  <text x="100" y="755" fill="#4b5563" font-family="Arial, sans-serif" font-size="24">Decision shortcut: start with Koinly or CoinLedger for simplicity, then move up only if your transaction history actually forces it.</text>
</svg>
